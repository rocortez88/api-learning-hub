name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Backend ──────────────────────────────────────────────────────────────
  backend:
    name: Backend — Typecheck, Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm run test:coverage
        env:
          NODE_ENV: test
          DATABASE_URL: 'file:./test.db'
          JWT_SECRET: 'test_secret_lo_suficientemente_largo_para_validacion'
          JWT_REFRESH_SECRET: 'test_refresh_secret_lo_suficientemente_largo'
          CORS_ORIGIN: 'http://localhost:5173'

      - name: Security audit
        run: npm audit --audit-level=high

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Typecheck & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: 'http://localhost:3001/api'
          VITE_APP_TITLE: 'API Learning Hub'

      - name: Security audit
        run: npm audit --audit-level=high
